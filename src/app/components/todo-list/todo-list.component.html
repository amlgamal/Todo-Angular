<div class="container py-4">
  <h1 class="text-center fw-bold mb-1">My Tasks</h1>
  <p class="text-center text-muted mb-4">{{ todoService.filterdTodos().length }} tasks remaining</p>

  <div class="mx-auto mb-4" style="max-width: 500px">
    <div class="input-group shadow-sm rounded-4 overflow-hidden">
      <span class="input-group-text bg-white border-end-0">
        <i class="bi bi-search text-muted"></i>
      </span>
      <input
        type="text"
        class="form-control border-start-0"
        placeholder="Search tasks..."
        (input)="onSearch($event)"
      />
    </div>
  </div>

  <div class="row">
    @for (item of todoService.filterdTodos(); track item.id) {
      <div class="col-4">
        <app-todo-item [itemInfo]="item"></app-todo-item>
      </div>
    }
  </div>
</div>
